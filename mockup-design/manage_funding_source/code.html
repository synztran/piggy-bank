</div>
</div>

<input class="w-full bg-slate-900/40 border border-sky-400/10 rounded-lg px-4 py-3 text-on-surface placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/40 transition-all" placeholder="e.g. Personal Bank" type="text"/>
</div>
</div>
<!-- Account Type Grid -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1">Account Type</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-sky-400/10 border border-primary text-primary transition-all active:scale-95" type="button">

<span class="text-[11px] font-semibold uppercase tracking-wider">BANK</span>

</button>

<label class="block text-sm font-medium text-on-surface-variant ml-1">Initial Balance</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-primary font-bold">$</span>
<input class="w-full bg-slate-900/40 border border-sky-400/10 rounded-lg pl-10 pr-4 py-3 text-on-surface text-xl font-bold placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/40 transition-all" placeholder="0" type="number"/>

</div>
