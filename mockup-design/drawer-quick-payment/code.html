<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transfer Input Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            glacier: {
              primary: '#7dd3fc',
              dark: '#0f172a', // slate-900
              darker: '#020617', // slate-950
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  </style>
<style data-purpose="glass-effects">
    .glass-key {
      background-color: rgba(248, 250, 252, 0.7); /* slate-50 with opacity */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .glass-key:active {
      background-color: rgba(226, 232, 240, 0.8); /* slate-200 */
    }
  </style>
</head>
<body class="bg-glacier-dark text-slate-100 min-h-screen flex items-center justify-center p-4 font-sans antialiased">
<!-- BEGIN: Device Container -->
<!-- Simulating a mobile device screen overlaid on a dark background -->
<main class="w-full max-w-[390px] h-[844px] bg-black rounded-[3rem] shadow-2xl relative overflow-hidden border-[6px] border-slate-800 flex flex-col">
<!-- Background atmospheric depth (Glacier styling) -->
<div class="absolute inset-0 bg-gradient-to-b from-slate-900 to-black z-0">
<div class="absolute top-0 right-0 w-64 h-64 bg-glacier-primary/5 rounded-full blur-[80px]"></div>
</div>
<!-- BEGIN: Status Bar -->
<header class="h-12 w-full flex justify-between items-center px-6 text-white text-[13px] font-semibold z-10 pt-2 absolute top-0 inset-x-0">
<span>1:01</span>
<!-- Dynamic Island Placeholder -->
<div class="w-[100px] h-7 bg-black rounded-full absolute left-1/2 -translate-x-1/2 top-2 z-20"></div>
<div class="flex gap-1.5 items-center">
<!-- Signal Icon -->
<svg class="w-4 h-4 fill-current" viewbox="0 0 24 24"><path d="M2,22h20V2L2,22z M20,20h-3V9h3V20z M15,20h-3v-7h3V20z M10,20H7v-4h3V20z"></path></svg>
<!-- Wifi Icon -->
<svg class="w-4 h-4 fill-current" viewbox="0 0 24 24"><path d="M12,3C6.95,3,3.15,4.85,0,7.23L12,22L24,7.23C20.85,4.85,17.05,3,12,3z M12,18L3.27,7.23C5.8,5.4,8.77,4.5,12,4.5 s6.2,0.9,8.73,2.73L12,18z"></path></svg>
<!-- Battery Icon -->
<svg class="w-6 h-4 fill-current" viewbox="0 0 24 24"><path d="M17,6H3C1.9,6,1,6.9,1,8v8c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V8C19,6.9,18.1,6,17,6z M17,16H3V8h14V16z M21,9v6h2V9H21z"></path><rect height="6" width="10" x="4" y="9"></rect></svg>
</div>
</header>
<!-- END: Status Bar -->
<!-- BEGIN: Main Interface Bottom Sheet -->
<!-- The light glass interface pulling up over the dark context -->
<section class="absolute bottom-0 inset-x-0 top-16 bg-white rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.2)] flex flex-col items-center pt-4 pb-8 z-20">
<!-- Drag Handle -->
<div class="w-10 h-1 bg-slate-200 rounded-full mb-6"></div>
<!-- BEGIN: Tabs -->
<nav class="flex items-center space-x-2 mb-3">
<button class="bg-slate-100 shadow-sm text-slate-900 px-5 py-2 rounded-full font-semibold text-sm transition-colors">
          Send
        </button>
<button class="text-slate-400 px-5 py-2 rounded-full font-medium text-sm hover:text-slate-600 transition-colors">
          Request
        </button>
</nav>
<!-- END: Tabs -->
<!-- Account Selector -->
<button class="flex items-center text-slate-400 text-[13px] font-medium gap-1 mb-10 hover:text-slate-600 transition-colors">
        Pavlo • 7642 USD
        <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<!-- BEGIN: Amount Display -->
<div class="relative flex flex-col items-center justify-center w-full mb-auto px-6">
<div class="flex items-center justify-center relative w-full h-32">
<!-- Main Amount -->
<span class="text-[5.5rem] font-bold text-slate-800 tracking-tighter leading-none">$286</span>
<!-- Recipient Avatar -->
<div class="absolute right-6 top-1/2 -translate-y-1/2">
<img alt="Recipient Avatar" class="w-9 h-9 rounded-full border-2 border-white shadow-sm object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCkQMgeBVRv3GnX4GgVIlTP6J2lEbG6j19Ue6J2K5qxFVaXdi3pI23Jle2Y-kI3BuO6Npe9DwLKc4mNZ4vy_JuOnAcS-kO38oxxtLpPFHae1CSU9-vjRV8ulRf-endl2BnwjM9xsqdP7XshJ8ajN_gfe3CoFvspAy05rAv4VerGVp2ujVOK7fq_Ve3afbVMCMH288vL4BjvKpmjHoz6I1fDiHEd5PdA55C9nUVbUpP6JGw75CcluKdjRsvzfxaNAIEEAcjjzVkaMIH"/>
</div>
</div>
<!-- Available Balance -->
<div class="text-slate-300 text-sm font-medium mt-2">
          Available <span class="text-slate-400">$7,854.43</span>
</div>
</div>
<!-- END: Amount Display -->
<!-- Swipe to Confirm Prompt -->
<div class="w-full px-8 mt-6 mb-8 relative">
<div class="flex justify-center items-center">
<span class="text-slate-300 font-medium text-[15px]">Swipe right to confirm</span>
</div>
</div>
<!-- BEGIN: Keypad Interface -->
<div class="w-full px-5 mt-auto">
<!-- Operators -->
<div class="flex justify-between items-center px-6 mb-5 text-slate-400 font-medium">
<button class="text-3xl hover:text-slate-600 transition-colors pb-1">+</button>
<button class="text-4xl hover:text-slate-600 transition-colors leading-none pb-2">−</button>
<button class="text-2xl hover:text-slate-600 transition-colors pb-1">×</button>
<button class="text-3xl hover:text-slate-600 transition-colors pb-1">÷</button>
</div>
<!-- Numeric Grid -->
<div class="grid grid-cols-3 gap-y-2 gap-x-2">
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">1</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">2</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">3</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">4</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">5</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">6</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">7</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">8</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">9</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-bold text-slate-400 flex items-center justify-center transition-all pb-3">.</button>
<button class="h-[4.5rem] rounded-[1.5rem] glass-key text-[28px] font-medium text-slate-800 flex items-center justify-center transition-all">0</button>
<button aria-label="Backspace" class="h-[4.5rem] rounded-[1.5rem] glass-key text-slate-400 flex items-center justify-center transition-all">
<svg class="w-7 h-7" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
<!-- END: Keypad Interface -->
</section>
<!-- END: Main Interface Bottom Sheet -->
</main>
<!-- END: Device Container -->
</body></html>
