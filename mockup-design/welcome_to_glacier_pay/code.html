<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#c8a0f0",
              "on-error-container": "#ffb3b3",
              "primary-fixed-dim": "#7dd3fc",
              "secondary-fixed": "#c0d8e8",
              "inverse-on-surface": "#0a0e1a",
              "on-secondary": "#001f2e",
              "on-primary-fixed-variant": "#004d73",
              "tertiary-fixed": "#e8d0ff",
              "outline-variant": "#2a3a48",
              "surface-container-high": "#1a2438",
              "surface-dim": "#0f1524",
              "on-error": "#1a0000",
              "error-container": "#3d1414",
              "surface-bright": "#1a2438",
              "error": "#ff6b6b",
              "on-secondary-container": "#c0d8e8",
              "primary-container": "#0e4d6e",
              "on-tertiary": "#1a002e",
              "on-secondary-fixed-variant": "#2a4a5e",
              "outline": "#4a6070",
              "on-tertiary-fixed-variant": "#4d2a73",
              "surface-container": "#141c2e",
              "on-tertiary-fixed": "#1a002e",
              "on-primary-container": "#c8eaff",
              "surface-tint": "#7dd3fc",
              "tertiary": "#c8a0f0",
              "secondary": "#88b4cc",
              "inverse-surface": "#e0e8f0",
              "surface-container-highest": "#202c42",
              "surface-container-lowest": "#0a0e1a",
              "primary-fixed": "#c8eaff",
              "primary": "#7dd3fc",
              "on-primary-fixed": "#001f2e",
              "secondary-container": "#1a3a4e",
              "on-surface": "#e0e8f0",
              "tertiary-container": "#3d2060",
              "surface": "#0f1524",
              "on-tertiary-container": "#e8d0ff",
              "inverse-primary": "#0a4c6e",
              "surface-container-low": "#111828",
              "on-secondary-fixed": "#0d1f2b",
              "on-primary": "#001f2e",
              "surface-variant": "#1a2438",
              "background": "#0a0e1a",
              "secondary-fixed-dim": "#88b4cc",
              "on-surface-variant": "#a0b4c4",
              "on-background": "#e0e8f0"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0a0e1a;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(15, 21, 36, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 211, 252, 0.1);
        }
        .glass-input {
            background: rgba(20, 28, 46, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(125, 211, 252, 0.1);
        }
        .glass-input:focus {
            border-color: rgba(125, 211, 252, 0.5);
            box-shadow: 0 0 15px rgba(125, 211, 252, 0.1);
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-primary-container/20 via-background to-background overflow-hidden">
<!-- Decorative Elements -->
<div class="fixed top-[-10%] right-[-5%] w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-80 h-80 bg-tertiary/10 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-md z-10">
<!-- Brand/Hero Section -->
<div class="flex flex-col items-center mb-8">
<div class="relative w-32 h-32 mb-6 group">
<!-- Playful Mascot (Piggy Bank with Glass Effect) -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl group-hover:bg-primary/30 transition-all duration-500"></div>
<div class="relative w-full h-full glass-panel rounded-full flex items-center justify-center border-primary/20 shadow-[0_0_30px_rgba(125,211,252,0.15)] overflow-hidden">
<img alt="Playful cartoon piggy bank" class="w-20 h-20 drop-shadow-[0_4px_10px_rgba(0,0,0,0.3)] transform group-hover:scale-110 transition-transform duration-300" data-alt="a cute 3d stylized pink cartoon piggy bank wearing sunglasses with a floating glowing digital coin above it on a dark backdrop" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAP-6orgrI61Bpp6QRYVIs6ub-y2uDB_PlcMBerOHxn09g-7P5Vts0jCLf0L1gaOMr7w0F1_OJSBpsZ1ipq_4koDRKlFVKjbGhRw-1uBATxMEQIsGhsEI8RhPgwiWp_j-8uj73eqwYJFy_xDuG6pRAFcM0RoZ1dkjhhwkANhPu4tEuyczyxlk0CY0wbf1h2znPvkr0bk_CzcW__nD64jx7L3RX5m6u0nFFIOJI8NT_mA5a25PrCOH8FzDBcLe51E0nRK_9ERU1AacBX"/>
</div>
<!-- Floating Coin Icon -->
<div class="absolute -top-2 -right-2 w-10 h-10 bg-tertiary-fixed-dim rounded-full flex items-center justify-center shadow-lg transform rotate-12">
<span class="material-symbols-outlined text-on-tertiary font-bold" style="font-variation-settings: 'FILL' 1;">currency_exchange</span>
</div>
</div>
<h1 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2">Glacier Pay</h1>
<p class="text-on-surface-variant font-medium text-center px-8">Where your savings don't melt away. <br/><span class="text-primary italic">Welcome back, Big Spender!</span></p>
</div>
<!-- Login Card -->
<div class="glass-panel p-8 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Subtle light streak -->
<div class="absolute -top-[100%] left-[-100%] w-[200%] h-[200%] bg-gradient-to-br from-white/5 via-transparent to-transparent pointer-events-none transform rotate-45"></div>
<form class="space-y-6 relative">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/60 text-xl">alternate_email</span>
</div>
<input class="glass-input w-full pl-12 pr-4 py-3.5 rounded-lg text-on-surface placeholder:text-on-surface-variant/40 transition-all" id="username" placeholder="e.g. SatoshiNakamoto" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-fixed transition-colors" href="#">Forgot it again?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/60 text-xl">lock_open</span>
</div>
<input class="glass-input w-full pl-12 pr-4 py-3.5 rounded-lg text-on-surface placeholder:text-on-surface-variant/40 transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<div class="pt-2">
<button class="w-full bg-primary/20 border border-primary/40 hover:bg-primary/30 active:scale-[0.98] py-4 rounded-lg text-primary font-bold text-lg tracking-wide transition-all shadow-[0_0_20px_rgba(125,211,252,0.1)] hover:shadow-[0_0_30px_rgba(125,211,252,0.2)] flex items-center justify-center gap-2" type="submit">
                        Unlock Vault
                        <span class="material-symbols-outlined">key</span>
</button>
</div>
</form>
<!-- Bottom Action -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                    New to the freezer? 
                    <a class="text-tertiary-fixed-dim font-bold hover:underline underline-offset-4 decoration-2" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Social Login (Optional/Light) -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center w-full gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant/50 font-bold">Or use your face</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="flex gap-4">
<button class="w-14 h-14 glass-panel rounded-full flex items-center justify-center text-on-surface hover:bg-primary/10 transition-colors group">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">face</span>
</button>
<button class="w-14 h-14 glass-panel rounded-full flex items-center justify-center text-on-surface hover:bg-primary/10 transition-colors group">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">fingerprint</span>
</button>
</div>
</div>
</main>
<!-- Contextual "Funny" Hint -->
<div class="fixed bottom-6 right-6 hidden md:block">
<div class="glass-panel p-4 rounded-xl border-tertiary/20 flex items-start gap-3 max-w-xs animate-bounce-slow">
<span class="material-symbols-outlined text-tertiary">lightbulb</span>
<p class="text-xs text-on-surface-variant italic font-medium leading-relaxed">
                Tip: Your dog's name followed by "123" is 400% more likely to be guessed by your cat.
            </p>
</div>
</div>
</body></html>
