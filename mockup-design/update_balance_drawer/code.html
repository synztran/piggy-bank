</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-sky-400/10 transition-colors active:scale-95 duration-200 text-slate-400">

</button>

<!-- Main Content (Home Dashboard Background) -->
<main class="pt-20 pb-32 px-6 max-w-lg mx-auto space-y-8">

<section class="glass-panel p-8 rounded-xl relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 blur-3xl -mr-16 -mt-16 rounded-full"></div>
<p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase">Current Balance</p>
<h2 class="text-4xl font-black text-on-surface mt-2 tracking-tight"><span class="text-lg font-medium text-primary">$</span>5,342.50</h2>
<div class="mt-6 flex gap-3">
<button class="flex-1 py-3 bg-primary/10 border border-primary/20 rounded-lg text-primary font-semibold flex items-center justify-center gap-2 hover:bg-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-sm">add</span> Deposit
            </button>
<button class="flex-1 py-3 bg-slate-800/40 border border-slate-700/50 rounded-lg text-on-surface font-semibold flex items-center justify-center gap-2 hover:bg-slate-700/60 transition-all active:scale-95">
<span class="material-symbols-outlined text-sm">send</span> Transfer
            </button>
</div>
</section>
<!-- Recent Transactions -->
<section class="space-y-4">
<div class="flex justify-between items-center">

</div>
<div class="space-y-3">

<div class="flex items-center gap-4">

</div>
<div>

<p class="text-xs text-on-surface-variant">Today, 14:20</p>
</div>
</div>
<p class="font-bold text-error">-$18.50</p>
</div>
<div class="glass-panel p-4 rounded-xl flex items-center justify-between">

<div class="w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center text-tertiary">

</div>
<div>
<p class="font-semibold text-on-surface">Received from Hung</p>
<p class="text-xs text-on-surface-variant">Yesterday, 09:15</p>
</div>
</div>
<p class="font-bold text-primary">+$85.00</p>
</div>
</div>
</section>

<div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[60]"></div>

<div class="fixed bottom-0 left-0 w-full z-[70] transition-transform duration-300 transform translate-y-0">
<div class="max-w-xl mx-auto glass-panel-elevated rounded-t-3xl shadow-[0_-8px_40px_rgba(0,0,0,0.6)] px-6 pt-3 pb-10">

<div class="flex justify-center mb-6">
<div class="w-12 h-1.5 bg-slate-700/50 rounded-full"></div>
</div>
<!-- Header -->
<div class="flex justify-between items-center mb-8">
<div>
<h2 class="text-2xl font-bold text-on-surface font-headline">Update Balance</h2>
<p class="text-on-surface-variant text-sm">Enter new balance for your account</p>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Input Form -->

<div class="relative">
<label class="absolute -top-2.5 left-4 px-2 bg-surface-container-highest/80 backdrop-blur-md text-xs font-semibold text-primary rounded-md border border-primary/20" for="balance-input">New Amount</label>
<div class="flex items-center glass-panel bg-slate-900/40 rounded-xl px-5 py-4 focus-within:ring-2 focus-within:ring-primary/50 transition-all border-primary/20">
<span class="text-2xl font-bold text-slate-500 mr-3">$</span>
<input class="bg-transparent border-none p-0 w-full text-2xl font-black text-on-surface focus:ring-0 placeholder:text-slate-700" id="balance-input" placeholder="0" type="number"/>
</div>
</div>

<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-outline-variant text-xs font-medium text-on-surface-variant hover:border-primary hover:text-primary transition-colors">+ 50</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-xs font-medium text-on-surface-variant hover:border-primary hover:text-primary transition-colors">+ 200</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-xs font-medium text-on-surface-variant hover:border-primary hover:text-primary transition-colors">+ 500</button>

<span class="material-symbols-outlined font-bold">check_circle</span>

<span class="material-symbols-outlined">home</span>

</a>

<span class="material-symbols-outlined">history</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest mt-1">History</span>
</a>
</nav>
